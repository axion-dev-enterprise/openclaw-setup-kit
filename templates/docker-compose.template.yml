services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: __CONTAINER_NAME__
    restart: unless-stopped
    env_file:
      - .env
    command:
      - node
      - openclaw.mjs
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
      - --allow-unconfigured
    ports:
      - "__GATEWAY_PORT__:18789"
      - "__WEBCHAT_PORT__:18790"
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./tools:/opt/openclaw-tools
      - ./browsers:/home/node/.cache/ms-playwright
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3m
      timeout: 10s
      start_period: 15s
      retries: 3
